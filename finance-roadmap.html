<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Finance Roadmap | Monarch Ops Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="./agenda-config.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #fff8ee;
      color: #201420;
      font-family: Urbanist, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .42;
      background:
        radial-gradient(circle at 18% 18%, rgba(244,124,32,.10), transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(45,95,148,.08), transparent 24%),
        radial-gradient(circle at 72% 80%, rgba(92,138,27,.08), transparent 30%);
    }
    button, select { font: inherit; }
    .wrap { position: relative; max-width: 1180px; margin: 0 auto; padding: 26px 20px 80px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .brand { display: flex; align-items: center; gap: 14px; }
    .mark { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; background: #201420; color: #f47c20; font-weight: 800; font-size: 24px; }
    .divider { width: 1px; height: 36px; background: #e0d2bd; }
    .title { font-size: 16px; font-weight: 800; }
    .sub { font-size: 12px; color: #a2978c; margin-top: 1px; }
    .actions { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
    .btn {
      border: 1px solid #e0d2bd;
      background: #fff;
      color: #201420;
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .btn.primary { border: none; background: #f47c20; color: #fff; }
    .btn.dark { border: none; background: #201420; color: #fff; }
    .hero { display: grid; grid-template-columns: 1.3fr .7fr; gap: 14px; align-items: stretch; margin-bottom: 14px; }
    .panel {
      background: rgba(255,255,255,.92);
      border: 1px solid #efe3d2;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 26px rgba(49,31,12,.04);
    }
    h1 { margin: 0; font-size: 28px; line-height: 1.05; letter-spacing: 0; }
    h2 { margin: 0 0 12px; font-size: 13px; letter-spacing: .06em; text-transform: uppercase; }
    .muted { color: #a2978c; }
    .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .stat { border: 1px solid #efe3d2; border-radius: 8px; background: #fff; padding: 12px; }
    .stat-label { font-size: 11px; color: #a2978c; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; }
    .stat-value { font-size: 26px; font-weight: 800; margin-top: 4px; }
    .filters { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin: 0 0 14px; }
    .chip {
      border: 1px solid #e0d2bd;
      background: #fff;
      color: #6e5f57;
      border-radius: 20px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .chip.active { background: #201420; color: #fff; border-color: #201420; }
    .roadmap { display: grid; grid-template-columns: repeat(5, minmax(190px, 1fr)); gap: 12px; align-items: start; overflow-x: auto; padding-bottom: 8px; }
    .lane { min-width: 190px; background: rgba(255,255,255,.72); border: 1px solid #efe3d2; border-radius: 12px; padding: 12px; }
    .lane-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .lane-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
    .lane-count { font-size: 11px; font-weight: 800; color: #6e5f57; background: #fff; border: 1px solid #e0d2bd; border-radius: 20px; padding: 2px 8px; }
    .task { background: #fff; border: 1px solid #efe3d2; border-radius: 8px; padding: 11px; margin-bottom: 9px; }
    .task.blocked { border-left: 3px solid #a32d2d; }
    .task.done { opacity: .62; }
    .task-title { font-size: 13.5px; font-weight: 700; line-height: 1.25; }
    .task.done .task-title { text-decoration: line-through; }
    .meta { margin-top: 6px; color: #6e5f57; font-size: 12px; line-height: 1.35; }
    .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .badge { border-radius: 20px; padding: 2px 8px; border: 1px solid #e0d2bd; background: #fff; font-size: 11px; font-weight: 700; color: #6e5f57; }
    .badge.red { border-color: #f0b9b9; background: #fbe7e7; color: #a32d2d; }
    .badge.orange { border-color: #ecd9ae; background: #faf0da; color: #8a5a0b; }
    .badge.blue { border-color: #c9d8ea; background: #eaf0f9; color: #2d5f94; }
    .badge.green { border-color: #c7d9ad; background: #edf5e4; color: #4e7a12; }
    .mini-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .mini {
      border: 1px solid #e0d2bd;
      background: #fff;
      color: #201420;
      border-radius: 20px;
      padding: 5px 9px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }
    .mini.done { border: none; background: #5c8a1b; color: #fff; }
    .empty { color: #a2978c; font-style: italic; font-size: 13px; padding: 10px 0; }
    .notice { border: 1px dashed #e0d2bd; background: #fff; border-radius: 12px; padding: 14px; color: #6e5f57; line-height: 1.45; }
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="mark">M</div>
        <div class="divider"></div>
        <div>
          <div class="title">Finance Roadmap</div>
          <div class="sub">Finance-linked workstreams from the Ops Dashboard</div>
        </div>
      </div>
      <div class="actions">
        <a class="btn" href="./">Back to dashboard</a>
        <a class="btn" href="./agenda.html">Daily agenda</a>
        <button class="btn primary" id="refreshBtn">Refresh</button>
      </div>
    </div>

    <section class="hero">
      <div class="panel">
        <h1>Finance roadmap</h1>
        <div class="meta" id="roadmapMeta">Loading dashboard workstreams...</div>
      </div>
      <div class="panel">
        <h2>Progress</h2>
        <div class="summary" id="summary"></div>
      </div>
    </section>

    <div class="filters" id="filters"></div>

    <section class="roadmap" id="roadmap"></section>
  </main>

  <script>
    const config = window.MPG_AGENDA_CONFIG || {};
    const dashboardKey = config.dashboardStorageKey || "mpg_ops_dashboard_data_v4";
    const financeTerms = [
      "finance", "financial", "cash", "bank", "banking", "invoice", "payment", "payroll", "wages",
      "tax", "audit", "insurance", "risk", "contract", "legal", "compliance", "registration",
      "board", "governance", "pwc", "broker", "insurer", "renewal", "fleet", "system",
      "automation", "dashboard", "data", "evidence", "document", "approval"
    ];
    const statuses = {
      ns: { label: "Not started", badge: "blue" },
      wip: { label: "In progress", badge: "orange" },
      wait: { label: "Waiting", badge: "blue" },
      blocked: { label: "Blocked", badge: "red" },
      review: { label: "Review", badge: "orange" },
      dn: { label: "Done", badge: "green" }
    };
    const priorities = {
      hi: { label: "High", badge: "orange" },
      crit: { label: "Critical", badge: "red" }
    };
    let activeFilter = "open";
    let state = loadDashboard();

    function loadDashboard() {
      try {
        return JSON.parse(localStorage.getItem(dashboardKey) || "{\"sections\":[]}");
      } catch (err) {
        return { sections: [] };
      }
    }

    function saveDashboard(data) {
      localStorage.setItem(dashboardKey, JSON.stringify(data));
    }

    function isFinanceLinked(section, task) {
      const haystack = [section.label, section.key, task.name, task.note, task.owner].filter(Boolean).join(" ").toLowerCase();
      return financeTerms.some((term) => haystack.includes(term));
    }

    function allRoadmapTasks() {
      const out = [];
      (state.sections || []).forEach((section) => {
        (section.tasks || []).forEach((task) => {
          if (isFinanceLinked(section, task)) out.push({ section, task });
        });
      });
      return out;
    }

    function dateValue(value) {
      if (!value) return null;
      const time = Date.parse(value);
      return Number.isNaN(time) ? null : time;
    }

    function dayStart(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function laneFor(task) {
      if (task.status === "dn") return "done";
      const due = dateValue(task.due);
      if (!due) return "nodate";
      const today = dayStart(new Date()).getTime();
      const days = Math.round((dayStart(due).getTime() - today) / 86400000);
      if (days <= 0) return "now";
      if (days <= 7) return "soon";
      return "later";
    }

    function filtered(items) {
      if (activeFilter === "all") return items;
      if (activeFilter === "open") return items.filter(({ task }) => task.status !== "dn");
      if (activeFilter === "blocked") return items.filter(({ task }) => task.status === "blocked" || task.status === "wait");
      if (activeFilter === "critical") return items.filter(({ task }) => task.priority === "crit" || task.priority === "hi");
      if (activeFilter === "done") return items.filter(({ task }) => task.status === "dn");
      return items;
    }

    function sortItems(items) {
      return items.slice().sort((a, b) => {
        const ad = dateValue(a.task.due) ?? Number.MAX_SAFE_INTEGER;
        const bd = dateValue(b.task.due) ?? Number.MAX_SAFE_INTEGER;
        if (ad !== bd) return ad - bd;
        return String(a.task.name || "").localeCompare(String(b.task.name || ""));
      });
    }

    function fmtDue(value) {
      const time = dateValue(value);
      if (!time) return "";
      return new Intl.DateTimeFormat("en-NZ", { day: "numeric", month: "short", year: "numeric" }).format(new Date(time));
    }

    function reqSummary(task) {
      const reqs = Array.isArray(task.reqs) ? task.reqs : [];
      if (!reqs.length) return "";
      const open = reqs.filter((req) => !(typeof req === "object" && req.done)).length;
      return open + "/" + reqs.length + " requirements open";
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
    }

    function taskBadges(task) {
      const out = [];
      const status = statuses[task.status] || statuses.ns;
      out.push('<span class="badge ' + status.badge + '">' + escapeHtml(status.label) + '</span>');
      if (task.priority && priorities[task.priority]) out.push('<span class="badge ' + priorities[task.priority].badge + '">' + priorities[task.priority].label + '</span>');
      if (task.owner) out.push('<span class="badge">' + escapeHtml(task.owner) + '</span>');
      if (task.due) out.push('<span class="badge">' + escapeHtml(fmtDue(task.due)) + '</span>');
      const reqs = reqSummary(task);
      if (reqs) out.push('<span class="badge blue">' + escapeHtml(reqs) + '</span>');
      return out.join("");
    }

    function taskCard(item) {
      const task = item.task;
      const done = task.status === "dn";
      const blocked = task.status === "blocked";
      return '<article class="task ' + (done ? "done " : "") + (blocked ? "blocked" : "") + '">' +
        '<div class="task-title">' + escapeHtml(task.name || "Untitled") + '</div>' +
        '<div class="meta">' + escapeHtml(item.section.label || "Dashboard") + (task.note ? " | " + escapeHtml(task.note) : "") + '</div>' +
        '<div class="badges">' + taskBadges(task) + '</div>' +
        '<div class="mini-actions">' +
          '<button class="mini ' + (done ? "" : "done") + '" data-section="' + escapeHtml(item.section.key) + '" data-task="' + escapeHtml(task.id) + '" data-action="' + (done ? "reopen" : "done") + '">' + (done ? "Reopen" : "Done") + '</button>' +
        '</div>' +
      '</article>';
    }

    function renderSummary(items) {
      const total = items.length;
      const done = items.filter(({ task }) => task.status === "dn").length;
      const blocked = items.filter(({ task }) => task.status === "blocked" || task.status === "wait").length;
      const dueSoon = items.filter(({ task }) => ["now", "soon"].includes(laneFor(task))).length;
      const stats = [
        ["Total", total],
        ["Active", total - done],
        ["Due soon", dueSoon],
        ["Blocked/waiting", blocked]
      ];
      document.getElementById("summary").innerHTML = stats.map(([label, value]) =>
        '<div class="stat"><div class="stat-label">' + label + '</div><div class="stat-value">' + value + '</div></div>'
      ).join("");
    }

    function renderFilters() {
      const filters = [
        ["open", "Open"],
        ["critical", "High/Critical"],
        ["blocked", "Blocked/Waiting"],
        ["done", "Done"],
        ["all", "All"]
      ];
      document.getElementById("filters").innerHTML = filters.map(([key, label]) =>
        '<button class="chip ' + (activeFilter === key ? "active" : "") + '" data-filter="' + key + '">' + label + '</button>'
      ).join("");
    }

    function render() {
      state = loadDashboard();
      const all = allRoadmapTasks();
      const items = filtered(all);
      renderSummary(all);
      renderFilters();
      document.getElementById("roadmapMeta").textContent = all.length
        ? all.length + " finance-linked dashboard items, grouped by due date and status."
        : "No finance-linked dashboard items found in this browser yet.";
      if (!all.length) {
        document.getElementById("roadmap").innerHTML = '<div class="panel notice">Open the dashboard first so this page can read the saved workstreams from this browser.</div>';
        return;
      }
      const lanes = [
        ["now", "Due now"],
        ["soon", "Next 7 days"],
        ["later", "Later"],
        ["nodate", "No date"],
        ["done", "Done"]
      ];
      document.getElementById("roadmap").innerHTML = lanes.map(([key, label]) => {
        const laneItems = sortItems(items.filter(({ task }) => laneFor(task) === key));
        return '<section class="lane"><div class="lane-head"><div class="lane-title">' + label + '</div><div class="lane-count">' + laneItems.length + '</div></div>' +
          (laneItems.length ? laneItems.map(taskCard).join("") : '<div class="empty">Nothing here.</div>') +
        '</section>';
      }).join("");
    }

    function updateTask(sectionKey, taskId, patch) {
      const data = loadDashboard();
      const section = (data.sections || []).find((s) => s.key === sectionKey);
      if (!section) return;
      const task = (section.tasks || []).find((t) => t.id === taskId);
      if (!task) return;
      Object.assign(task, patch);
      saveDashboard(data);
      state = data;
      render();
    }

    document.getElementById("refreshBtn").addEventListener("click", render);
    document.getElementById("filters").addEventListener("click", (event) => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;
      activeFilter = button.dataset.filter;
      render();
    });
    document.getElementById("roadmap").addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      updateTask(button.dataset.section, button.dataset.task, { status: button.dataset.action === "done" ? "dn" : "wip" });
    });

    render();
  </script>
</body>
</html>
