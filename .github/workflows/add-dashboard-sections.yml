name: add-dashboard-sections

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-dashboard-sections.yml
      - .github/scripts/add_dashboard_sections.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch dashboard
        run: python .github/scripts/add_dashboard_sections.py
      - name: Commit dashboard update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-dashboard-sections.yml .github/scripts/add_dashboard_sections.py
          git add monarch-ops-dashboard.html
          git commit -m "Add dashboard section headers"
          git push
