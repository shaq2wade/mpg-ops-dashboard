name: One-time dashboard subtasks update

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-dashboard-subtasks.yml'
      - '.github/scripts/add_subtasks.py'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  patch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add task requirements and Insurance example
        run: python .github/scripts/add_subtasks.py
      - name: Remove one-time patch files
        run: git rm .github/workflows/add-dashboard-subtasks.yml .github/scripts/add_subtasks.py
      - name: Commit dashboard subtasks update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add monarch-ops-dashboard.html
          git commit -m "Add task subtasks and insurance requirements"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
