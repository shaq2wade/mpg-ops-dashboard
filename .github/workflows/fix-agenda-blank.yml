name: Fix agenda blank state

on:
  push:
    paths:
      - ".github/workflows/fix-agenda-blank.yml"
      - ".github/scripts/fix_agenda_blank.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch agenda files
        run: python .github/scripts/fix_agenda_blank.py
      - name: Commit agenda fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agenda.html Start-Agenda-AutoRefresh.ps1
          git rm -f .github/workflows/fix-agenda-blank.yml .github/scripts/fix_agenda_blank.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix agenda Outlook helper rendering"
            git push
          fi
