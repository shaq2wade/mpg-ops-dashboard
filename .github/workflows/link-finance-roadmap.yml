name: Link finance roadmap

on:
  push:
    paths:
      - ".github/workflows/link-finance-roadmap.yml"
      - ".github/scripts/link_finance_roadmap.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch links
        run: python .github/scripts/link_finance_roadmap.py
      - name: Commit links
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agenda.html monarch-ops-dashboard.html
          git rm -f .github/workflows/link-finance-roadmap.yml .github/scripts/link_finance_roadmap.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Link finance roadmap page"
            git push
          fi
