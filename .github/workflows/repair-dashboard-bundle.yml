name: One-time dashboard bundle repair

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/repair-dashboard-bundle.yml'
      - '.github/scripts/repair_bundle_json.py'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  repair-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Repair dashboard bundle JSON
        run: python .github/scripts/repair_bundle_json.py
      - name: Remove one-time repair files
        run: git rm .github/workflows/repair-dashboard-bundle.yml .github/scripts/repair_bundle_json.py
      - name: Commit repaired dashboard
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add monarch-ops-dashboard.html
          git commit -m "Repair dashboard bundle JSON"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
