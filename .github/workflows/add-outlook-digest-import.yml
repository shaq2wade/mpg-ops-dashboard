name: add-outlook-digest-import

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-outlook-digest-import.yml
      - .github/scripts/add_outlook_digest_import.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch agenda page
        run: python .github/scripts/add_outlook_digest_import.py
      - name: Commit agenda update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-outlook-digest-import.yml .github/scripts/add_outlook_digest_import.py
          git add agenda.html
          git commit -m "Add Outlook inbox and task digest import"
          git push
