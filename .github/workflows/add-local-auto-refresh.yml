name: add-local-auto-refresh

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-local-auto-refresh.yml
      - .github/scripts/add_local_auto_refresh.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch agenda page
        run: python .github/scripts/add_local_auto_refresh.py
      - name: Commit agenda update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-local-auto-refresh.yml .github/scripts/add_local_auto_refresh.py
          git add agenda.html
          git commit -m "Add local Outlook agenda auto-refresh"
          git push
