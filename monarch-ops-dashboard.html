document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 allWS.push({ s, t })));\n    const all = allWS.map(x => x.t);\n    const total = all.length;\n    const cnt = (f) => all.filter(f).length;\n    const dn = cnt(t=>t.status==='dn'), wip = cnt(t=>t.status==='wip'), ns = cnt(t=>t.status==='ns'), wait = cnt(t=>t.status==='wait'), blocked = cnt(t=>t.status==='blocked'), review = cnt(t=>t.status==='review'), active = total - dn - ns;\n    const overdue = cnt(t=>this.isOverdue(t)), crit = cnt(t=>t.priority==='crit'), hi = cnt(t=>t.priority==='hi');\n    const pct = total ? Math.round(dn/total*100) : 0;\n    const circ = 2*Math.PI*40;\n\n    const numStyle = (c)=>'font-size:27px;font-weight:800;margin-top:6px;line-height:1;color:'+c;\n\n    // view tabs\n    const views = [['list','📋 List'],['board','🗂 Board'],['analytics','📊 Analytics'],['calendar','🗓 Timeline']];\n    const seg = (a)=>'font:600 12.5px Urbanist;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;white-space:nowrap;transition:all .15s;'+(a?'background:#201420;color:#fff':'background:transparent;color:#6E5F57');\n    const viewTabs = views.map(([k,l]) => ({ label:l, style:seg(st.view===k), onClick:()=>this.setView(k) }));\n\n    // filters\n    const fdef = [['inprogress','In progress',''],['critical','🔴 Critical','red'],['overdue','⚠️ Overdue'+(overdue?' ('+overdue+')':''),'red']];\n    const filters = [{ label:'All', style:this.pill(st.activeFilter==='all',''), onClick:()=>this.setState({activeFilter:'all'}) }]\n      .concat(fdef.map(([k,l,kind]) => ({ label:l, style:this.pill(st.activeFilter===k,kind), onClick:()=>this.setFilter(k) })));\n\n    // section tabs\n    const tabBadge = (a)=>'font:700 10px Urbanist;padding:1px 6px;border-radius:10px;min-width:16px;text-align:center;'+(a?'background:rgba(255,255,255,.25);color:#fff':'background:#F1E7D6;color:#6E5F57');\n    const tabs = [{ label:'All', count:total, badgeStyle:tabBadge(st.activeTab==='all'), style:this.pill(st.activeTab==='all','dark'), onClick:()=>this.setTab('all') }]\n      .concat(data.sections.map(s => ({ label:s.label, count:this.getFiltered(s.tasks).length, badgeStyle:tabBadge(st.activeTab===s.key), style:this.pill(st.activeTab===s.key,'dark'), onClick:()=>this.setTab(s.key) })));\n\n    // list sections\n    const listSections = data.sections\n      .filter(s => st.activeTab==='all' || st.activeTab===s.key)\n      .filter(s => st.activeFilter==='all' || this.getFiltered(s.tasks).length>0)\n      .map(sec => {\n        const base = st.activeFilter==='all' ? sec.tasks : this.getFiltered(sec.tasks);\n        const visible = base.filter(t => st.showOldDone || !this.isOldDone(t));\n        const hiddenOld = base.filter(t => this.isOldDone(t)).length;\n        const sdn = sec.tasks.filter(t=>t.status==='dn').length, stot = sec.tasks.length;\n        const spct = stot ? Math.round(sdn/stot*100) : 0;\n        const bc = spct===100?'#5C8A1B':spct>50?'#F47C20':'#F9A11E';\n        return {\n          label:sec.label, countLabel:sdn+'/'+stot, pctLabel:spct+'%',\n          dotStyle:'width:10px;height:10px;border-radius:50%;flex:none;background:'+sec.color,\n          barStyle:'height:100%;border-radius:5px;transition:width .6s;width:'+spct+'%;background:'+bc,\n          tasks:visible.map(t=>this.taskVM(sec,t)),\n          hasHiddenOld:hiddenOld>0, hiddenLabel:hiddenOld+' completed task'+(hiddenOld>1?'s':'')+' hidden (done 1m+)',\n          addKey:'an-'+sec.key, statusKey:'as-'+sec.key,\n          onAddTask:()=>this.addTask(sec.key), onDelete:()=>this.deleteSection(sec.key),\n        };\n      });\n\n    // board columns\n    const scope = data.sections.filter(s => st.activeTab==='all' || st.activeTab===s.key);\n    const cardPool = []; scope.forEach(s => this.getFiltered(s.tasks).filter(t => st.showOldDone || !this.isOldDone(t)).forEach(t => cardPool.push(this.taskVM(s,t))));\n    const colDefs = this.STATUS_ORDER.map(k => [k, this.ST[k].label]);\n    const columns = colDefs.map(([k,l]) => {\n      const cards = cardPool.filter(c => { const sec=data.sections.find(x=>x.key===c.secKey); return sec.tasks.find(t=>t.id===c.id).status===k; });\n      const hot = st.dragOverCol===k;\n      return {\n        label:l, count:cards.length, cards, empty:cards.length===0,\n        dotStyle:'width:9px;height:9px;border-radius:50%;flex:none;background:'+this.ST[k].col,\n        style:'background:'+(hot?'#FBF0E4':'#F6EEE0')+';border:1.5px '+(hot?'dashed var(--a)':'solid #EFE3D2')+';border-radius:14px;padding:14px;min-height:140px;transition:background .15s,border-color .15s',\n        onDragOver:(e)=>this.onColOver(k,e), onDrop:(e)=>this.onColDrop(k,e), onDragLeave:()=>this.setState({dragOverCol:null}),\n      };\n    });\n\n    // analytics\n    const w = (n)=>total?(n/total*100):0;\n    const statusBar = {\n      done:'width:'+w(dn)+'%;background:#5C8A1B;transition:width .6s',\n      wip:'width:'+w(active)+'%;background:#F47C20;transition:width .6s',\n      ns:'width:'+w(ns)+'%;background:#C9C2BC;transition:width .6s',\n    };\n    const statusMetrics = [\n      { label:'Done', count:dn, dotStyle:'width:11px;height:11px;border-radius:50%;flex:none;background:#5C8A1B' },\n      { label:'In progress', count:wip, dotStyle:'width:11px;height:11px;border-radius:50%;flex:none;background:#F47C20' },\n      { label:'Waiting', count:wait, dotStyle:'width:11px;height:11px;border-radius:50%;flex:none;background:#4D7FB3' },\n      { label:'Blocked', count:blocked, dotStyle:'width:11px;height:11px;border-radius:50%;flex:none;background:#C0392B' },\n      { label:'Review', count:review, dotStyle:'width:11px;height:11px;border-radius:50%;flex:none;background:#8E63C7' },\n      { label:'Not started', count:ns, dotStyle:'width:11px;height:11px;border-radius:50%;flex:none;background:#C9C2BC' },\n    ];\n    const pmax = Math.max(crit, hi, total-crit-hi, 1);\n    const priorityBars = [\n      { label:'Critical', count:crit, barStyle:'height:100%;border-radius:7px;transition:width .6s;width:'+(crit/pmax*100)+'%;background:#C0392B' },\n      { label:'High', count:hi, barStyle:'height:100%;border-radius:7px;transition:width .6s;width:'+(hi/pmax*100)+'%;background:#C98A1F' },\n      { label:'Standard', count:total-crit-hi, barStyle:'height:100%;border-radius:7px;transition:width .6s;width:'+((total-crit-hi)/pmax*100)+'%;background:#A9A29C' },\n    ];\n    const sectionBars = data.sections.map(s => {\n      const t = s.tasks.length, d2 = s.tasks.filter(x=>x.status==='dn').length, wp = s.tasks.filter(x=>!['ns','dn'].includes(x.status)).length, n2 = s.tasks.filter(x=>x.status==='ns').length;\n      const pp = (x)=>t?(x/t*100):0;\n      return { label:s.label, summary:d2+'/'+t+' done',\n        barDone:'width:'+pp(d2)+'%;background:#5C8A1B;transition:width .6s',\n        barWip:'width:'+pp(wp)+'%;background:#F47C20;transition:width .6s',\n        barNs:'width:'+pp(n2)+'%;background:#C9C2BC;transition:width .6s' };\n    });\n    const today = new Date(); today.setHours(0,0,0,0);\n    const dueOpen = allWS.filter(x => x.t.due && x.t.status!=='dn').sort((a,b)=>new Date(a.t.due)-new Date(b.t.due));\n    const dueList = dueOpen.slice(0,10).map(x => {\n      const od = this.isOverdue(x.t);\n      const days = Math.round((new Date(x.t.due)-today)/86400000);\n      const dl = od ? Math.abs(days)+'d overdue' : days===0?'today':days===1?'tomorrow':'in '+days+'d';\n      return { name:x.t.name, secLabel:x.s.label,\n        dotStyle:'width:9px;height:9px;border-radius:50%;flex:none;background:'+x.s.color,\n        daysLabel:dl, daysStyle:'font:600 12px Urbanist;padding:3px 10px;border-radius:20px;white-space:nowrap;'+(od?'background:#FBE7E7;color:#A32D2D':days<=7?'background:#FCEAD7;color:#B5650F':'background:#F1E7D6;color:#6E5F57') };\n    });\n\n    // timeline\n    const dated = allWS.filter(x => x.t.due).sort((a,b)=>new Date(a.t.due)-new Date(b.t.due));\n    const odG = { label:'⚠️ Overdue', headStyle:'color:#A32D2D', items:[] };\n    const map = {}, order = [];\n    dated.forEach(x => {\n      const d = new Date(x.t.due), od = this.isOverdue(x.t), done = x.t.status==='dn';\n      const days = Math.round((d-today)/86400000);\n      const tag = od ? '⚠️ Overdue' : done ? '✓ Done' : days===0?'Today':days===1?'Tomorrow':'in '+days+'d';\n      const item = {\n        day:String(d.getDate()), mon:d.toLocaleDateString('en-NZ',{month:'short'}),\n        name:x.t.name, secLabel:x.s.label,\n        nameStyle:'font-size:14px;font-weight:600;'+(done?'text-decoration:line-through;color:#6E5F57':'color:#201420'),\n        chipStyle:'width:48px;height:48px;border-radius:11px;flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;'+(od?'background:#FBE7E7;color:#A32D2D':done?'background:#E7F0DA;color:#4E7A12':'background:#FCEAD7;color:#B5650F'),\n        tag, tagStyle:'font:600 11px Urbanist;padding:4px 11px;border-radius:20px;white-space:nowrap;'+(od?'background:#FBE7E7;color:#A32D2D':done?'background:#E7F0DA;color:#4E7A12':days<=7?'background:#FCEAD7;color:#B5650F':'background:#F1E7D6;color:#6E5F57'),\n      };\n      if (od) odG.items.push(item);\n      else { const key=d.toLocaleDateString('en-NZ',{month:'long',year:'numeric'}); if(!map[key]){map[key]={label:key,headStyle:'color:#A2978C',items:[]};order.push(key);} map[key].items.push(item); }\n    });\n    const timeline = []; if (odG.items.length) timeline.push(odG); order.forEach(k => timeline.push(map[k]));\n\n    // palette\n    const q = st.paletteQuery.toLowerCase();\n    let res = [];\n    const add = (icon,label,hint,run) => res.push({ icon, label, hint, run });\n    views.forEach(([k,l]) => add(l.split(' ')[0], 'View: '+l.split(' ')[1], 'view', ()=>this.setView(k)));\n    add('🔴','Filter: Critical','filter',()=>{this.setView('list');this.setState({activeFilter:'critical'});});\n    add('⚠️','Filter: Overdue','filter',()=>{this.setView('list');this.setState({activeFilter:'overdue'});});\n    add('🔄','Filter: In progress','filter',()=>{this.setView('list');this.setState({activeFilter:'inprogress'});});\n    add('✕','Clear filters','filter',()=>this.setState({activeFilter:'all',activeTab:'all'}));\n    data.sections.forEach(s => add('▸','Go to: '+s.label,'section',()=>{this.setView('list');this.setTab(s.key);}));\n    allWS.forEach(x => add('•', x.t.name, x.s.label, ()=>{this.setView('list');this.setTab(x.s.key);this.setState({editingId:x.t.id,commentingId:null});}));\n    if (q) res = res.filter(r => (r.label+' '+r.hint).toLowerCase().includes(q));\n    res = res.slice(0,8);\n    this._results = res;\n    const sel = Math.min(st.paletteSel, Math.max(0,res.length-1));\n    const paletteResults = res.map((r,i) => ({\n      icon:r.icon, label:r.label, hint:r.hint,\n      rowStyle:'display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:9px;cursor:pointer;'+(i===sel?'background:#FCEAD7':''),\n      onClick:()=>{ r.run(); this.setState({paletteOpen:false}); },\n      onHover:()=>this.setState({paletteSel:i}),\n    }));\n\n    const syncMap = { saving:['saving…','#B5650F'], saved:['✓ saved','#4E7A12'], error:['⚠️ save issue','#A32D2D'], idle:['● live','#5C8A1B'] };\n    const sy = syncMap[st.syncStatus] || syncMap.idle;\n\n    return {\n      rootRef:this.rootRef,\n      syncLabel:sy[0],\n      syncStyle:'position:fixed;top:14px;right:16px;z-index:60;font:700 11px Urbanist;padding:5px 13px;border-radius:20px;background:#fff;border:1px solid #EFE3D2;box-shadow:0 2px 6px rgba(0,0,0,.07);color:'+sy[1],\n      openPalette:()=>this.setState({paletteOpen:true,paletteQuery:'',paletteSel:0}),\n      closePalette:()=>this.setState({paletteOpen:false}),\n      viewTabs,\n      ring:{ circ, offset: circ*(1-pct/100) },\n      stats:{ pct, doneLabel:dn+' of '+total+' done', activeLabel:active+' active · '+overdue+' overdue' },\n      statCards:[\n        { label:'Active', value:active, valueStyle:numStyle('#F47C20') },\n        { label:'Blocked', value:blocked, valueStyle:numStyle(blocked?'#A32D2D':'#201420') },\n        { label:'Review', value:review, valueStyle:numStyle('#8E63C7') },\n        { label:'Completed', value:dn, valueStyle:numStyle('#5C8A1B') },\n      ],\n      showFilters: st.view==='list' || st.view==='board',\n      filters, tabs,\n      toggleOldDone:()=>this.setState(s=>({showOldDone:!s.showOldDone})),\n      oldDoneStyle:'font:500 11px Urbanist;padding:5px 12px;border-radius:20px;border:1px solid #E0D2BD;background:#fff;color:#6E5F57;cursor:pointer;margin-left:auto',\n      oldDoneLabel: st.showOldDone ? '🙈 Hide old done' : '👁 Show old done (1m+)',\n      isList: st.view==='list', isBoard: st.view==='board', isAnalytics: st.view==='analytics', isCalendar: st.view==='calendar',\n      listSections, listEmpty: listSections.length===0,\n      regEl:this.regEl, onInput:this.onInput, onCommentKey:this.onCommentKey, onAddTaskKey:this.onAddTaskKey,\n      addSection:()=>this.addSection(),\n      columns,\n      statusBar, statusMetrics, priorityBars, sectionBars,\n      dueList, dueEmpty: dueList.length===0,\n      timeline, timelineEmpty: timeline.length===0,\n      paletteOpen:st.paletteOpen, paletteQuery:st.paletteQuery, paletteResults, paletteEmpty:res.length===0,\n      paletteRef:this.paletteRef, onPaletteInput:this.onPaletteInput, stop:this.stop,\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"},"entry":"Monarch Ops Dashboard.dc"}</script>
